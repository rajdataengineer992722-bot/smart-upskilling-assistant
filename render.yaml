services:
  - type: web
    name: smart-upskilling-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: MONGODB_URI
        sync: false
      - key: DATABASE_NAME
        value: smart_upskilling
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
